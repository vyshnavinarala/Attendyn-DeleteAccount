<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Account</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa; /* clean light background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card Container */
.container {
    background: #ffffff;
    width: 90%;
    max-width: 400px;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    text-align: center;
}

/* Title */
.container h2 {
    color: #2d5be3;
    margin-bottom: 10px;
}

/* Description */
.container p {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Input Fields */
.input-box {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
    transition: 0.2s ease;
}

/* Focus effect */
.input-box:focus {
    border-color: #7F7FD5;
}

/* Textarea */
textarea.input-box {
    height: 80px;
    resize: none;
}

/* Delete Button */
.btn-delete {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff4b5c, #ff6a6a);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.btn-delete:hover {
    transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">
    <h2>Delete Your Attendyn Account</h2>
    <p>We're sorry to see you go.Please submit this form to request permanent deletion of your Attendyn account.</p>

    <input type="text" class="input-box" placeholder="Enter your full name">
    <input type="email" class="input-box" placeholder="Enter your registered email">
    
    <textarea class="input-box" placeholder="Reason for leaving (optional)"></textarea>

    <button class="btn-delete">Delete My Account</button>
</div>

</body>
</html>
